name: CI/CD
on:
  push:
    branches: ["main"]
  pull_request:
jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      AZURE_BACKEND_WEBAPP_NAME: ${{ secrets.AZURE_BACKEND_WEBAPP_NAME }}
      AZURE_BACKEND_PUBLISH_PROFILE: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations check and tests
        env:
          DJANGO_SECRET_KEY: ci-secret
          DJANGO_DEBUG: "true"
          MONGODB_URI: mongodb://127.0.0.1:27017/gateadvisor_ci
          MONGODB_NAME: gateadvisor_ci
        run: |
          python manage.py migrate --noinput
          python manage.py check
          python manage.py test

      # CHANGE 1: zip only the backend folder contents for deploy
      - name: Zip backend for deployment
        run: |
          zip -r ../backend_deploy.zip . -x "*.pyc" -x "__pycache__/*" -x ".git/*"

      - name: Deploy backend to Azure Web App
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.AZURE_BACKEND_WEBAPP_NAME != '' && env.AZURE_BACKEND_PUBLISH_PROFILE != ''
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_BACKEND_WEBAPP_NAME }}
          publish-profile: ${{ env.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: ./backend_deploy.zip   # CHANGE 2: deploy the zip, not the folder
          startup-command: "gunicorn gateadvisor.wsgi:application --bind 0.0.0.0:8000 --workers 2"  # CHANGE 3: explicit startup

  frontend:
    runs-on: ubuntu-latest
    env:
      AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        run: npm install
      - name: Lint and build frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://gate-advisor-backend.azurewebsites.net/api' }}
        run: |
          npm run lint
          npm run build
      - name: Deploy frontend to Azure Static Web Apps
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.AZURE_STATIC_WEB_APPS_API_TOKEN != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          skip_app_build: true
