services:
  db:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate --noinput &&
      python manage.py seed_gate_data --reset &&
      python manage.py collectstatic --noinput &&
      gunicorn gateadvisor.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: local-dev-secret
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      MONGODB_URI: mongodb://db:27017/test_userss
      MONGODB_NAME: test_userss
      UNLOCK_AMOUNT_PAISE: 1000
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
