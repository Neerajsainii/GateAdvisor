services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gateadvisor
      POSTGRES_USER: gate_user
      POSTGRES_PASSWORD: gate_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate --noinput &&
      python manage.py seed_gate_data &&
      python manage.py collectstatic --noinput &&
      gunicorn gateadvisor.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: local-dev-secret
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      DATABASE_URL: postgres://gate_user:gate_password@db:5432/gateadvisor
      UNLOCK_AMOUNT_PAISE: 1000
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
